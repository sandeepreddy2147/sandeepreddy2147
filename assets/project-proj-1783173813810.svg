<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 388" width="100%" height="auto">
  <defs>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="800" height="388" rx="16" fill="#FAF9F6" />
  <rect width="800" height="388" rx="16" fill="url(#cardGlow)" />
  <rect x="0.5" y="0.5" width="799" height="387" rx="16" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1.5" />

  <!-- Featured label -->
  <g transform="translate(36, 44)">
    <text x="0" y="0" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" letter-spacing="2">FEATURED SYSTEM</text>
  </g>

  <!-- Decoration dots -->
  <g opacity="0.4" transform="translate(752, 36)">
    <circle cx="0" cy="0" r="3" fill="#FF6B00" />
    <circle cx="10" cy="0" r="3" fill="#FF6B00" />
  </g>

  <!-- Project Name -->
  <g transform="translate(36, 90)">
    <text x="0" y="0" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold">Tvarit</text>
  </g>

  <!-- Description -->
  <g transform="translate(36, 128)">
    
      <text x="0" y="0" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="normal" fill-opacity="0.88">Tvarit is an AI-powered meal kit platform that recommends</text>
    
      <text x="0" y="26" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="normal" fill-opacity="0.88">personalized recipes based on user preferences, dietary goals,</text>
    
      <text x="0" y="52" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="normal" fill-opacity="0.88">allergies, and available ingredients. It provides perfectly</text>
    
      <text x="0" y="78" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="normal" fill-opacity="0.88">portioned ingredient kits, guided cooking instructions, and a</text>
    
      <text x="0" y="104" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="normal" fill-opacity="0.88">seamless online ordering experience.</text>
    
  </g>

  <!-- Tech Badges -->
  <g>
        <g transform="translate(36, 278)">
          <rect width="89.6" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="44.8" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">React 19</text>
        </g>
      
        <g transform="translate(135.6, 278)">
          <rect width="130.6" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="65.3" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Firebase Auth</text>
        </g>
      
        <g transform="translate(276.2, 278)">
          <rect width="147" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="73.5" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Cloud Firestore</text>
        </g>
      
        <g transform="translate(433.2, 278)">
          <rect width="147" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="73.5" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Cloud Functions</text>
        </g>
      
        <g transform="translate(590.2, 278)">
          <rect width="81.39999999999999" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="40.699999999999996" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Node.js</text>
        </g>
      
        <g transform="translate(36, 320)">
          <rect width="122.39999999999999" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="61.199999999999996" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Tailwind CSS</text>
        </g>
      
        <g transform="translate(168.39999999999998, 320)">
          <rect width="155.2" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="77.6" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Leaflet Maps API</text>
        </g>
      
        <g transform="translate(333.59999999999997, 320)">
          <rect width="97.8" height="32" rx="6" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="48.9" y="21" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">AI Engine</text>
        </g>
      </g>
</svg>